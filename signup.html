<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Tech Logistics</title>
    <meta name="description" content="Create your Tech Logistics account for dispatch and ELD services." />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
</head>
<body>
    <!-- ======================================================
         LOADING SCREEN
    ======================================================= -->
    <div id="loader">
        <div class="loader-content">
            <img src="images/logo.png" alt="Tech Logistics" class="loader-logo" />
            <div class="loader-spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- ======================================================
         NAVIGATION
    ======================================================= -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">

            <!-- Logo + Company Name -->
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="Tech Logistics" />
                <div class="nav-logo-text">
                    <strong>Tech Logistics</strong>
                    <span>Dispatch & ELD Services</span>
                </div>
            </a>

            <!-- Navigation Menu -->
            <ul class="nav-menu" id="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="services.html" class="nav-link">Services</a>
                </li>
                <li class="nav-item">
                    <a href="login.html" class="nav-link">Login</a>
                </li>
                <li class="nav-item">
                    <a href="signup.html" class="nav-link active">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a href="contact.html" class="nav-link">Contact</a>
                </li>
            </ul>

            <!-- Mobile Menu Button -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- ======================================================
         SIGNUP SECTION
    ======================================================= -->
    <section class="auth-section">
        <div class="auth-bg"></div>
        <div class="auth-overlay"></div>

        <div class="auth-container">
            <div class="auth-card">

                <!-- Header -->
                <div class="auth-header">
                    <img src="images/logo.png" alt="Tech Logistics" class="auth-logo" />
                    <h1>Create Account</h1>
                    <p>Join Tech Logistics today</p>
                </div>

                <!-- Signup Form -->
                <form class="auth-form" id="signupForm">

                    <!-- Row 1 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="usdotNumber">USDOT Number</label>
                            <input
                                type="text"
                                id="usdotNumber"
                                name="usdotNumber"
                                placeholder="Enter USDOT Number"
                                required
                            />
                            <i class="fas fa-id-card"></i>
                        </div>

                        <div class="form-group">
                            <label for="companyName">Company Name</label>
                            <input
                                type="text"
                                id="companyName"
                                name="companyName"
                                placeholder="Enter Company Name"
                                required
                            />
                            <i class="fas fa-building"></i>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signupEmail">Email Address</label>
                            <input
                                type="email"
                                id="signupEmail"
                                name="email"
                                placeholder="Enter Email Address"
                                required
                            />
                            <i class="fas fa-envelope"></i>
                        </div>

                        <!-- Phone Number with Country Code -->
                        <div class="form-group">
                            <label for="phone">Phone Number</label>

                            <div class="phone-input-wrapper">
                                <!-- Country Code Dropdown -->
                                <select
                                    id="countryCode"
                                    name="countryCode"
                                    class="country-code"
                                    required
                                >
                                    <option value="+91">🇮🇳 +91</option>
                                    <option value="+1">🇺🇸 +1</option>
                                </select>

                                <!-- Phone Input -->
                                <input
                                    type="tel"
                                    id="phone"
                                    name="phone"
                                    placeholder="Enter Phone Number"
                                    pattern="[0-9]{7,15}"
                                    inputmode="numeric"
                                    required
                                />

                                <!-- Phone Icon -->
                                <i class="fas fa-phone"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <input
                                type="password"
                                id="signupPassword"
                                name="password"
                                placeholder="Create Password"
                                minlength="6"
                                required
                            />
                            <i class="fas fa-lock"></i>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input
                                type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                placeholder="Confirm Password"
                                minlength="6"
                                required
                            />
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" required />
                            <span class="checkmark"></span>
                            I agree to the Terms &amp; Conditions
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary btn-full">
                        Create Account
                    </button>
                </form>

                <!-- Footer -->
                <div class="auth-footer">
                    <p>
                        Already have an account?
                        <a href="login.html">Login</a>
                    </p>
                </div>

            </div>
        </div>
    </section>

    <!-- ======================================================
         FOOTER
    ======================================================= -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Tech Logistics. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- ======================================================
         JAVASCRIPT
    ======================================================= -->
    <script src="script.js"></script>

    <!-- Password Match Validation -->
    <script>
        document.getElementById("signupForm").addEventListener("submit", function (e) {
            const password = document.getElementById("signupPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert("Passwords do not match.");
                return;
            }
        });
    </script>
</body>
</html>
